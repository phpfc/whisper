name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      - name: Install cross
        run: cargo install cross
      - name: Build
        run: cross build --release --target x86_64-unknown-linux-gnu
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: t-chat-linux
          path: target/x86_64-unknown-linux-gnu/release/t-chat

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: t-chat-macos
          path: target/release/t-chat

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: t-chat-windows
          path: target/release/t-chat.exe
